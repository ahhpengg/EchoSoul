<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>EchoSoul - Emotion Not Recognised</title>
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/vendor/tailwind.js"></script>
  <script src="../js/tailwind-config.js"></script>
</head>
<body data-page="error" class="bg-background text-on-surface font-body-md min-h-screen overflow-hidden selection:bg-primary-container selection:text-on-primary-container">

  <!-- Sidebar, top app bar and bottom player are injected by js/chrome.js -->

  <!-- Main Content Area - Error Screen -->
  <main class="lg:ml-[280px] mt-16 h-[calc(100vh-64px-96px)] flex flex-col items-center justify-center relative px-4 md:p-container-padding pb-32">
    <div class="absolute inset-0 pointer-events-none overflow-hidden z-0 flex items-center justify-center opacity-30">
      <div class="w-[600px] h-[600px] bg-primary-container rounded-full blur-[120px] mix-blend-screen opacity-20"></div>
      <div class="w-[400px] h-[400px] bg-tertiary-container rounded-full blur-[100px] mix-blend-screen opacity-10 absolute top-1/4 right-1/4"></div>
    </div>

    <div class="z-10 flex flex-col items-center justify-center max-w-2xl w-full">
      <!-- Error Illustration -->
      <div class="relative w-full max-w-md mb-8 flex items-center justify-center">
        <img src="../assets/img/error.png" alt="Out-of-scope emotion" class="w-full max-h-[280px] md:max-h-[360px] object-contain drop-shadow-[0_0_30px_rgba(221,183,255,0.25)]">
      </div>

      <!-- Error Message (text set per error_code by the backend wiring later) -->
      <div class="flex flex-col items-center text-center gap-4">
        <h2 class="text-headline-lg font-headline-lg md:text-headline-xl md:font-headline-xl font-bold text-white tracking-tight">Sorry !</h2>
        <p id="error-message" class="text-body-md md:text-body-lg font-body-md text-on-surface-variant max-w-md">Looks like you're showing an out-of-system-defined emotion...<br>Please reattempt the session</p>
      </div>

      <!-- Action Button -->
      <div class="mt-12">
        <a href="home.html" class="inline-block bg-white text-background px-8 py-3 rounded-full font-label-md font-bold hover:scale-105 transition-transform shadow-lg">Back to Home Page</a>
      </div>
    </div>
  </main>

  <script src="../js/chrome.js"></script>
  <script src="../js/titlebar.js"></script>
</body>
</html>
