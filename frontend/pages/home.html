<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>EchoSoul - Emotional Discovery</title>
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/vendor/tailwind.js"></script>
  <script src="../js/tailwind-config.js"></script>
</head>
<body data-page="home" class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden relative">

  <!-- Sidebar, top app bar and bottom player are injected by js/chrome.js -->

  <!-- Main Content Canvas -->
  <main class="lg:ml-[280px] pt-24 px-4 md:px-container-padding pb-32 max-w-[1440px] mx-auto min-h-screen flex flex-col gap-stack-lg">

    <!-- Hero Section: Emotion Scanner -->
    <section id="camera-hero-section" class="animate-fade-in-up relative w-full h-[280px] md:h-[320px] rounded-[32px] overflow-hidden flex flex-col items-center justify-start pt-12 md:pt-16 shadow-2xl shadow-background/50 border border-white/5 bg-surface-container-low cursor-pointer group transition-all duration-500">
      <div class="absolute inset-0 bg-gradient-to-t from-background/90 via-transparent to-transparent z-0 pointer-events-none"></div>
      <h2 class="text-headline-lg font-headline-lg md:text-headline-xl md:font-headline-xl text-white drop-shadow-md z-20 text-center px-4 transition-opacity duration-300" id="hero-caption">Scan Emotion for<br>Recommended Playlist</h2>
      <div class="absolute bottom-0 left-0 w-full h-full flex justify-center items-end z-10 pointer-events-none transition-opacity duration-300" id="local-camera-wrapper">
        <div class="camera-mover w-full flex justify-center">
          <img id="local-camera-img" src="../assets/img/hero-camera.png" alt="Scan emotion camera" class="camera-floater w-[500px] max-w-[85%] object-contain drop-shadow-[0_0_35px_rgba(221,183,255,0.35)] transition-all duration-700">
        </div>
      </div>
    </section>

    <!-- Manual Mood Selection -->
    <section class="animate-fade-in-up delay-100 flex flex-col items-center gap-stack-sm text-center">
      <h3 class="text-headline-md font-headline-md text-on-surface">Prefer not to show your face?</h3>
      <p class="text-body-md font-body-md text-on-surface-variant mb-4">Choose your mood manually here</p>
      <div class="flex flex-wrap justify-center gap-3 max-w-3xl">
        <button class="mood-chip px-5 py-2.5 rounded-full bg-surface-container border border-outline-variant hover:border-primary hover:bg-primary/10 transition-all text-label-md font-label-md text-on-surface flex items-center gap-2 group" data-emotion="happy">
          <span class="w-2 h-2 rounded-full bg-secondary group-hover:shadow-[0_0_10px_rgba(78,222,163,0.5)]"></span>Happy
        </button>
        <button class="mood-chip px-5 py-2.5 rounded-full bg-surface-container border border-outline-variant hover:border-primary hover:bg-primary/10 transition-all text-label-md font-label-md text-on-surface flex items-center gap-2 group" data-emotion="surprised">
          <span class="w-2 h-2 rounded-full bg-secondary-fixed group-hover:shadow-[0_0_10px_rgba(111,251,190,0.5)]"></span>Surprised
        </button>
        <button class="mood-chip px-5 py-2.5 rounded-full bg-surface-container border border-outline-variant hover:border-primary hover:bg-primary/10 transition-all text-label-md font-label-md text-on-surface flex items-center gap-2 group" data-emotion="neutral">
          <span class="w-2 h-2 rounded-full bg-yellow-400 group-hover:shadow-[0_0_10px_rgba(250,204,21,0.5)]"></span>Neutral
        </button>
        <button class="mood-chip px-5 py-2.5 rounded-full bg-surface-container border border-outline-variant hover:border-primary hover:bg-primary/10 transition-all text-label-md font-label-md text-on-surface flex items-center gap-2 group" data-emotion="sad">
          <span class="w-2 h-2 rounded-full bg-tertiary-container group-hover:shadow-[0_0_10px_rgba(77,142,255,0.5)]"></span>Sad
        </button>
        <button class="mood-chip px-5 py-2.5 rounded-full bg-surface-container border border-outline-variant hover:border-primary hover:bg-primary/10 transition-all text-label-md font-label-md text-on-surface flex items-center gap-2 group" data-emotion="angry">
          <span class="w-2 h-2 rounded-full bg-red-400 group-hover:shadow-[0_0_10px_rgba(248,113,113,0.5)]"></span>Angry
        </button>
        <button id="manual-mood-btn" class="px-5 py-2.5 rounded-full bg-primary text-on-primary font-bold shadow-md hover:shadow-lg transition-all text-label-md font-label-md flex items-center gap-2">
          Your Mood <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </button>
      </div>
    </section>

    <!-- Latest saved playlist showcase — hidden until home.js fills it from
         list_user_playlists / load_playlist; stays hidden when nothing has
         been saved yet. Title and the button open the full playlist view
         (result.html#playlist=<id>); the cover's hover button plays the whole
         playlist in-app (Premium; Free falls back to opening the view). -->
    <section id="recent-playlist-section" class="animate-fade-in-up delay-200 mt-8 hidden">
      <div class="flex flex-col sm:flex-row sm:items-end gap-stack-md mb-8">
        <div id="recent-cover-tile" class="w-[180px] h-[180px] md:w-[200px] md:h-[200px] rounded-xl shadow-2xl shadow-background/80 overflow-hidden relative group bg-gradient-to-br from-primary-container to-surface-container-high flex items-center justify-center shrink-0 cursor-pointer">
          <span id="recent-cover-fallback" class="material-symbols-outlined text-[96px] text-on-surface/70">music_note</span>
          <img id="recent-cover" alt="Playlist cover" class="w-full h-full object-cover hidden">
          <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
            <!-- home.js themes this to the emotion accent and swaps the glyph
                 to play_arrow for Premium accounts. -->
            <span id="recent-cover-btn" class="w-14 h-14 rounded-full bg-secondary text-on-secondary flex items-center justify-center shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-all duration-300">
              <span class="material-symbols-outlined text-[28px]">arrow_forward</span>
            </span>
          </div>
        </div>
        <div class="flex flex-col gap-2 pb-2 min-w-0">
          <p class="text-label-sm font-label-sm text-outline uppercase tracking-widest">Your latest playlist</p>
          <h1 id="recent-title" data-open-playlist class="text-headline-lg font-headline-lg md:text-headline-xl md:font-headline-xl text-on-surface tracking-tight cursor-pointer hover:text-primary transition-colors"></h1>
          <p class="text-body-md font-body-md text-on-surface-variant flex items-center gap-2 mt-2">
            <span class="material-symbols-outlined text-[18px]">favorite</span>
            <span id="recent-meta"></span>
          </p>
          <div class="flex items-center gap-4 mt-4">
            <button data-open-playlist class="px-5 py-2.5 rounded-full bg-primary text-on-primary font-bold shadow-md hover:shadow-lg transition-all text-label-md font-label-md flex items-center gap-2">
              Open playlist <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Tracklist preview (first few songs; home.js appends a "view all" row) -->
      <div class="w-full rounded-2xl bg-surface-container border border-white/5 overflow-hidden">
        <div class="track-grid px-4 md:px-6 py-4 border-b border-white/5 text-label-sm font-label-sm text-outline-variant uppercase tracking-wider sticky top-0 bg-surface-container/95 backdrop-blur-sm z-10">
          <div class="text-center">#</div>
          <div>Title</div>
          <div>Artist</div>
          <div class="track-col-album">Album</div>
          <div class="text-right">Time</div>
        </div>
        <div id="recent-tracklist" class="flex flex-col pb-4"></div>
      </div>
    </section>
  </main>

  <script src="../js/chrome.js"></script>
  <script src="../js/titlebar.js"></script>
  <script type="module" src="../js/sidebar.js"></script>
  <script type="module" src="../js/playback.js"></script>
  <script type="module" src="../js/home.js"></script>
</body>
</html>
