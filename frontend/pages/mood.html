<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>EchoSoul - Select Your Mood</title>
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/vendor/tailwind.js"></script>
  <script src="../js/tailwind-config.js"></script>
</head>
<body data-page="mood" class="bg-background text-on-surface min-h-screen overflow-x-hidden font-body-md text-body-md selection:bg-primary selection:text-on-primary">

  <!-- Sidebar, top app bar and bottom player are injected by js/chrome.js -->

  <!-- Main Content Wrapper -->
  <div class="lg:ml-[280px] flex flex-col min-h-screen pb-32">
    <main class="flex-grow flex flex-col items-center justify-center px-4 md:px-gutter pt-24 pb-12 w-full max-w-[1440px] mx-auto">
      <h2 class="text-headline-lg font-headline-lg md:text-headline-xl md:font-headline-xl text-on-surface mb-stack-lg text-center tracking-wide font-light">WHAT IS YOUR CURRENT MOOD?</h2>

      <!-- Top Row -->
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 max-w-4xl mx-auto w-full mb-4 md:mb-6">
        <button class="mood-card group flex flex-col items-center justify-center p-6 md:p-8 bg-surface-container hover:bg-[#4ADE80] rounded-xl border border-white/5 transition-all duration-300 hover:-translate-y-2 aspect-square hover:text-background" data-emotion="happy">
          <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-[#A3E635]/10 flex items-center justify-center mb-4 md:mb-6 group-hover:scale-110 transition-transform duration-300"><span class="material-symbols-outlined text-[48px] md:text-[64px] text-[#A3E635] filled">sentiment_very_satisfied</span></div>
          <span class="text-headline-md font-headline-md text-on-surface tracking-wider">HAPPY</span>
        </button>
        <button class="mood-card group flex flex-col items-center justify-center p-6 md:p-8 bg-surface-container hover:bg-[#2DD4BF] rounded-xl border border-white/5 transition-all duration-300 hover:-translate-y-2 aspect-square hover:text-background" data-emotion="surprised">
          <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-[#4ADE80]/10 flex items-center justify-center mb-4 md:mb-6 group-hover:scale-110 transition-transform duration-300"><span class="material-symbols-outlined text-[48px] md:text-[64px] text-[#4ADE80] filled">sentiment_excited</span></div>
          <span class="text-headline-md font-headline-md text-on-surface tracking-wider">SURPRISE</span>
        </button>
        <button class="mood-card group flex flex-col items-center justify-center p-6 md:p-8 bg-surface-container hover:bg-[#F87171] rounded-xl border border-white/5 transition-all duration-300 hover:-translate-y-2 aspect-square hover:text-white" data-emotion="angry">
          <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-[#EF4444]/10 flex items-center justify-center mb-4 md:mb-6 group-hover:scale-110 transition-transform duration-300"><span class="material-symbols-outlined text-[48px] md:text-[64px] text-[#EF4444] filled">sentiment_very_dissatisfied</span></div>
          <span class="text-headline-md font-headline-md text-on-surface tracking-wider">ANGRY</span>
        </button>
      </div>

      <!-- Bottom Row (centered on desktop, stacks responsively) -->
      <div class="flex flex-wrap justify-center gap-4 md:gap-6 max-w-4xl mx-auto w-full">
        <button class="mood-card group flex flex-col items-center justify-center p-6 md:p-8 bg-surface-container hover:bg-[#FACC15] rounded-xl border border-white/5 transition-all duration-300 hover:-translate-y-2 w-[calc(50%-8px)] md:w-[calc(33.333%-16px)] aspect-square hover:text-background" data-emotion="neutral">
          <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-[#EAB308]/10 flex items-center justify-center mb-4 md:mb-6 group-hover:scale-110 transition-transform duration-300"><span class="material-symbols-outlined text-[48px] md:text-[64px] text-[#EAB308] filled">sentiment_neutral</span></div>
          <span class="text-headline-md font-headline-md text-on-surface tracking-wider">NEUTRAL</span>
        </button>
        <button class="mood-card group flex flex-col items-center justify-center p-6 md:p-8 bg-surface-container hover:bg-[#3b82f6] rounded-xl border border-white/5 transition-all duration-300 hover:-translate-y-2 w-[calc(50%-8px)] md:w-[calc(33.333%-16px)] aspect-square hover:text-background" data-emotion="sad">
          <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-[#3b82f6]/10 flex items-center justify-center mb-4 md:mb-6 group-hover:scale-110 transition-transform duration-300"><span class="material-symbols-outlined text-[48px] md:text-[64px] text-[#3b82f6] filled">mood_bad</span></div>
          <span class="text-headline-md font-headline-md text-on-surface tracking-wider">SAD</span>
        </button>
      </div>
    </main>
  </div>

  <script src="../js/chrome.js"></script>
  <script src="../js/titlebar.js"></script>
  <script src="../js/mood.js"></script>
</body>
</html>
