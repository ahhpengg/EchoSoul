<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>MoodStream - Your Playlist</title>
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/vendor/tailwind.js"></script>
  <script src="../js/tailwind-config.js"></script>
</head>
<body data-page="result" class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary-container selection:text-on-primary-container">

  <!-- Sidebar, top app bar and bottom player are injected by js/chrome.js -->

  <!-- Main Content Canvas -->
  <main class="lg:ml-[280px] pt-24 px-4 md:px-container-padding pb-32 max-w-[1440px] mx-auto min-h-screen flex flex-col gap-stack-lg">

    <!-- Mood Result Banner (themed per emotion by result.js) -->
    <section id="result-banner" class="animate-fade-in-up relative w-full h-[280px] md:h-[320px] rounded-[32px] overflow-hidden flex flex-col items-center justify-center gap-4 shadow-2xl border border-white/5 backdrop-blur-md" style="background-color: rgba(111,251,190,0.12);">
      <div id="result-banner-overlay" class="absolute inset-0 pointer-events-none" style="background: linear-gradient(to bottom, rgba(111,251,190,0.10), transparent);"></div>
      <div class="relative z-10 flex flex-col items-center text-center px-6 md:px-8">
        <div class="w-24 h-24 md:w-28 md:h-28 mb-4 flex items-center justify-center">
          <img id="result-emoji" src="../assets/img/emoji-happy.png" alt="" class="w-full h-full object-contain">
        </div>
        <h2 id="result-heading" class="text-headline-lg font-headline-lg md:text-headline-xl md:font-headline-xl tracking-tight mb-2" style="color: #6ffbbe;">You seem Happy!</h2>
        <p id="result-subtitle" class="text-body-md font-body-md md:text-body-lg md:font-body-lg text-on-surface opacity-90">We have customized a playlist to match this vibe.</p>
      </div>
    </section>

    <!-- Playlist Detail -->
    <section class="animate-fade-in-up delay-200 mt-8">
      <div class="flex flex-col sm:flex-row sm:items-end gap-stack-md mb-8">
        <div id="playlist-cover" class="w-[180px] h-[180px] md:w-[200px] md:h-[200px] rounded-xl shadow-2xl shadow-background/80 overflow-hidden relative group flex items-center justify-center shrink-0" style="background-image: linear-gradient(135deg, #6ffbbe, #222a3d);">
          <img id="cover-icon" src="../assets/img/cover-happy.png" alt="" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
            <button class="w-14 h-14 rounded-full bg-secondary text-on-secondary flex items-center justify-center shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-all duration-300">
              <span class="material-symbols-outlined filled text-[32px] ml-1">play_arrow</span>
            </button>
          </div>
        </div>
        <div class="flex flex-col gap-2 pb-2 min-w-0">
          <p class="text-label-sm font-label-sm text-outline uppercase tracking-widest">Playlist</p>
          <h1 id="playlist-title" class="text-headline-lg font-headline-lg md:text-headline-xl md:font-headline-xl text-on-surface tracking-tight">Happy Playlist</h1>
          <p class="text-body-md font-body-md text-on-surface-variant flex items-center gap-2 mt-2">
            <span class="material-symbols-outlined text-[18px]">favorite</span>
            <span id="playlist-meta">Curated for your joyful moments • 24 songs, 1 hr 15 min</span>
          </p>
          <div class="flex items-center gap-4 mt-4">
            <button class="text-white hover:opacity-80 transition-opacity"><span class="material-symbols-outlined text-[24px]">bookmark</span></button>
            <button class="text-white hover:opacity-80 transition-opacity"><span class="material-symbols-outlined text-[24px]">play_circle</span></button>
            <button class="text-white hover:opacity-80 transition-opacity"><span class="material-symbols-outlined text-[24px]">edit</span></button>
          </div>
        </div>
      </div>

      <!-- Tracklist Table -->
      <div class="w-full rounded-2xl bg-surface-container border border-white/5 overflow-hidden">
        <div class="track-grid px-4 md:px-6 py-4 border-b border-white/5 text-label-sm font-label-sm text-outline-variant uppercase tracking-wider sticky top-0 bg-surface-container/95 backdrop-blur-sm z-10">
          <div class="text-center">#</div>
          <div>Title</div>
          <div>Artist</div>
          <div class="track-col-album">Album</div>
          <div class="text-right">Time</div>
        </div>
        <div id="tracklist" class="flex flex-col pb-4"></div>
      </div>
    </section>
  </main>

  <script src="../js/chrome.js"></script>
  <script src="../js/result.js"></script>
</body>
</html>
