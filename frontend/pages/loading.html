<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>EchoSoul - Analyzing Emotion</title>
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/app.css">
  <script src="../js/vendor/tailwind.js"></script>
  <script src="../js/tailwind-config.js"></script>
</head>
<body data-page="loading" class="bg-background text-on-surface font-body-md min-h-screen overflow-hidden selection:bg-primary-container selection:text-on-primary-container">

  <!-- Animated "Vibe Canvas" WebGL background (degrades to the dark bg if WebGL is unavailable) -->
  <canvas id="shader-canvas" class="fixed inset-0 w-full h-full z-0 pointer-events-none"></canvas>

  <!-- Sidebar, top app bar and bottom player are injected by js/chrome.js -->

  <!-- Main Content Area - Loading Screen -->
  <main class="lg:ml-[280px] mt-16 h-[calc(100vh-64px-96px)] flex flex-col items-center justify-center relative px-4 md:p-container-padding pb-32">
    <div class="absolute inset-0 pointer-events-none overflow-hidden z-0 flex items-center justify-center opacity-30">
      <div class="w-[600px] h-[600px] bg-primary-container rounded-full blur-[120px] mix-blend-screen opacity-20"></div>
      <div class="w-[400px] h-[400px] bg-tertiary-container rounded-full blur-[100px] mix-blend-screen opacity-10 absolute top-1/4 right-1/4"></div>
    </div>

    <div class="z-10 flex flex-col items-center justify-center max-w-2xl w-full">
      <div class="relative w-64 h-64 mb-12 flex items-center justify-center">
        <div class="relative w-56 h-56 flex items-center justify-center pulse-text">
          <img src="../assets/img/loading.png" alt="Analyzing emotion" class="w-44 h-44 object-contain drop-shadow-[0_0_25px_rgba(221,183,255,0.45)]">
        </div>
      </div>

      <div class="w-full max-w-md space-y-stack-sm flex flex-col items-center">
        <div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden border border-white/5">
          <!-- Width driven by loading.js per pipeline stage; shimmer from .progress-bar-fill. -->
          <div id="loading-progress" class="h-full bg-primary rounded-full progress-bar-fill relative" style="width: 0%; transition: width 0ms linear;">
            <div class="absolute inset-0 bg-white/20 w-full"></div>
          </div>
        </div>
        <p id="loading-status" class="text-headline-md font-headline-md text-on-surface mt-6 pulse-text tracking-wide">Analyzing Emotion...</p>
        <p id="loading-substatus" class="text-label-md font-label-md text-on-surface-variant mt-2 opacity-70">Scanning micro-expressions and tone</p>
      </div>
    </div>
  </main>

  <script src="../js/chrome.js"></script>
  <script src="../js/titlebar.js"></script>
  <script type="module" src="../js/sidebar.js"></script>
  <script type="module" src="../js/playback.js"></script>
  <script type="module" src="../js/search.js"></script>
  <script src="../js/shader.js"></script>
  <script type="module" src="../js/loading.js"></script>
</body>
</html>
